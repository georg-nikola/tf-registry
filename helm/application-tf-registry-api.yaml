apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tf-registry-api
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: api=ghcr.io/georg-nikola/tf-registry-api
    argocd-image-updater.argoproj.io/api.update-strategy: semver
    argocd-image-updater.argoproj.io/api.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/api.helm.image-tag: image.tag
spec:
  project: default

  source:
    repoURL: https://github.com/georg-nikola/tf-registry
    targetRevision: main
    path: helm/tf-registry-api
    helm:
      releaseName: tf-registry-api
      valueFiles:
        - values.yaml
      values: |
        replicaCount: 1

        image:
          registry: ghcr.io
          repository: georg-nikola/tf-registry-api
          pullPolicy: Always
          tag: "1.1.2"

        service:
          type: ClusterIP
          port: 80
          targetPort: 8000

        ingress:
          enabled: true
          host: tf-registry.georg-nikola.com

        env:
          BASE_URL: "https://tf-registry.georg-nikola.com"
          STORAGE_ROOT: "/data/modules"

        existingSecret: "tf-registry-api-secrets"

        storage:
          size: 10Gi
          storageClassName: ""
          mountPath: /data

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

  info:
    - name: Repository
      value: https://github.com/georg-nikola/tf-registry
    - name: URL
      value: https://tf-registry.georg-nikola.com/api/health

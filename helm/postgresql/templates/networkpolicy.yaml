apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "postgresql.fullname" . }}
  labels:
    app: {{ include "postgresql.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "postgresql.fullname" . }}
  policyTypes:
    - Ingress
  ingress:
    # Only the tf-registry-api pods may connect on 5432
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: tf-registry-api
      ports:
        - protocol: TCP
          port: 5432

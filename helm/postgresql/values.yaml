image:
  repository: postgres
  tag: "16.13-alpine3.23"
  pullPolicy: IfNotPresent

fullnameOverride: "postgresql"

auth:
  database: tfregistry
  username: tfregistry
  # password and postgresPassword come from the secret
  existingSecret: postgresql-credentials
  secretKeys:
    userPasswordKey: password
    adminPasswordKey: postgres-password

storage:
  size: 5Gi
  storageClassName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Pod-level security context (e.g. fsGroup for PVC permissions).
podSecurityContext: {}

# Container-level security context. Set readOnlyRootFilesystem: true to
# satisfy the verify-image / KSV014 audit policy. When enabled, also set
# extraVolumes/extraVolumeMounts below to provide writable paths the
# postgres image needs (/tmp, /var/run/postgresql).
containerSecurityContext: {}

# Additional volumes appended to the StatefulSet pod spec. Use with
# extraVolumeMounts to provide writable emptyDirs when
# readOnlyRootFilesystem is enabled.
extraVolumes: []

# Additional volume mounts appended to the postgres container. Pair with
# extraVolumes.
extraVolumeMounts: []

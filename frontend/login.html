<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Terraform Module Registry</title>
  <link rel="stylesheet" href="style.css?v=1.1.1">
  <style>
    .login-card {
      max-width: 420px;
      margin: 4rem auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 2.5rem;
    }
    .login-card h1 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1.4rem;
    }
    .login-card .subtitle {
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
      font-size: 0.9rem;
    }
    .login-card .admin-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 1.25rem;
      text-align: center;
    }
    .logged-in-box {
      max-width: 420px;
      margin: 4rem auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 2.5rem;
      text-align: center;
    }
    .logged-in-box .check {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }
    .logged-in-box h2 {
      margin: 0 0 0.5rem;
    }
    .logged-in-box p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">TF Registry</a>
      <nav>
        <a href="/">Browse</a>
        <a href="upload.html" id="nav-upload">Upload</a>
        <a href="login.html" id="nav-login">Login</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div id="login-section">
      <div id="login-card" class="login-card">
        <h1>Sign in</h1>
        <p class="subtitle">Required to upload or delete modules.</p>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" required placeholder="Username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" required placeholder="Password">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Sign in</button>
        </form>
        <p class="admin-note">Single-admin registry — credentials are set by the administrator.</p>
      </div>

      <div id="logged-in-box" class="logged-in-box" style="display:none">
        <div class="check">✓</div>
        <h2>Signed in</h2>
        <p id="logged-in-msg">You are currently signed in.</p>
        <button id="logout-btn" class="btn btn-danger">Sign out</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      Terraform Module Registry v1.0.0
    </div>
  </footer>

  <script src="app.js?v=1.1.1"></script>
</body>
</html>
